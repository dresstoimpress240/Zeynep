<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZEYNEP PRINCESS GOLD</title>
<style>
  * { -webkit-touch-callout: none; -webkit-user-select: none; touch-action: none; }
  body { margin: 0; background: #050a1e; overflow: hidden; font-family: 'Arial', sans-serif; }
  canvas { display: block; width: 100%; height: 100%; }
  
  /* Interface Score */
  #ui { 
    position: absolute; top: 20px; left: 20px; color: #fff; 
    font-size: 45px; font-weight: bold; text-shadow: 0 0 10px #ff0055; 
    z-index: 10; pointer-events: none;
  }
  
  /* Lecteur Gims Optimisé - Bien visible en haut à droite */
  #gims-box { 
    position: absolute; top: 10px; right: 10px; 
    z-index: 100; background: #ff0055; padding: 5px; 
    border: 2px solid white; border-radius: 10px;
    box-shadow: 0 0 15px rgba(255,0,85,0.5);
  }
</style>
</head>
<body>

<div id="ui">💰 <span id="val">0</span></div>

<div id="gims-box">
  <iframe width="150" height="85" src="https://www.youtube.com/embed/ERk4Lx-mOqQ?enablejsapi=1&autoplay=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>
</div>

<canvas id="game"></canvas>

<script>
// --- CODE SPECIAL TABLETTE 2014 (ES5) ---
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var valScore = document.getElementById('val');

var w = window.innerWidth;
var h = window.innerHeight;
canvas.width = w;
canvas.height = h;

var score = 0;
var speed = 8;
var isOver = false;
var frame = 0;
var py = h - 200;
var pdy = 0;
var jumps = 0;
var mode = 'normal';
var modeTimer = 0;
var obs = [];

function restart() {
  score = 0; speed = 8; isOver = false; frame = 0;
  py = h - 250; pdy = 0; mode = 'normal'; modeTimer = 0;
  obs = []; valScore.innerHTML = "0";
}

function spawn() {
  var x = w + 100;
  var r = Math.random();
  var type = 'coin';
  var em = "🟡";
  
  if (r < 0.45) { type = 'danger'; em = (Math.random() > 0.5 ? "🌵" : "👾"); }
  else if (r < 0.8) { type = 'gift'; em = "🎁"; }
  
  obs.push({ x: x, y: h - 145, type: type, em: em });
}

function update() {
  if (!isOver) {
    frame++;
    speed += 0.003;
    
    if (modeTimer > 0) {
        modeTimer--;
    } else {
        mode = 'normal';
    }

    // Physique de saut
    pdy += (mode === 'dragon' ? 0.4 : 1.2);
    py += pdy;
    
    var sol = h - 145;
    if (py > sol) {
      py = sol;
      pdy = 0;
      jumps = 0;
    }
    
    if (frame % 40 === 0) spawn();
    
    for (var i = 0; i < obs.length; i++) {
      var o = obs[i];
      o.x -= speed;
      
      // Collision Princesse
      if (100 < o.x + 60 && 100 + 70 > o.x && py < o.y + 60 && py + 70 > o.y) {
        if (o.type === 'coin') {
          score += 50;
          valScore.innerHTML = score;
          obs.splice(i, 1);
        } else if (o.type === 'gift') {
          var modes = ['giant', 'dragon', 'ghost'];
          mode = modes[Math.floor(Math.random()*3)];
          modeTimer = 300;
          obs.splice(i, 1);
        } else {
          if (mode === 'giant') {
              score += 100;
              obs.splice(i, 1);
          } else if (mode !== 'ghost') {
              isOver = true;
          }
        }
      }
      if (o.x < -150) obs.splice(i, 1);
    }
  }
  draw();
  requestAnimationFrame(update);
}

function draw() {
  // Fond 
  ctx.fillStyle = (mode === 'ghost' ? "#000" : "#050a1e");
  ctx.fillRect(0, 0, w, h);
  
  // Sol Néon (HSL marche sur les versions 2014 mises à jour)
  ctx.fillStyle = "hsl(" + (frame % 360) + ", 100%, 50%)";
  ctx.fillRect(0, h - 65, w, 10);
  ctx.fillStyle = "#000";
  ctx.fillRect(0, h - 55, w, 55);
  
  // Obstacles
  ctx.font = "70px Arial";
  for (var j = 0; j < obs.length; j++) {
    ctx.fillText(obs[j].em, obs[j].x, obs[j].y + 50);
  }
  
  // Zeynep Princesse
  var pChar = "👸";
  if (mode === 'dragon') pChar = "🐲";
  if (mode === 'ghost') { pChar = "👻"; ctx.globalAlpha = 0.5; }
  
  var pSize = (mode === 'giant' ? "150px" : "100px");
  ctx.font = pSize + " Arial";
  ctx.fillText(pChar, 100, py + (mode === 'giant' ? 100 : 70));
  ctx.globalAlpha = 1.0;
  
  if (isOver) {
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = "#ff0055";
    ctx.textAlign = "center";
    ctx.font = "bold 80px sans-serif";
    ctx.fillText("K.O. !", w/2, h/2 - 50);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 50px sans-serif";
    ctx.fillText("REVANCHE", w/2, h/2 + 120);
    ctx.textAlign = "left";
  }
}

function handle(e) {
  // Sécurité pour ne pas sauter quand on clique sur Gims
  if (e && e.target && (e.target.tagName === 'IFRAME' || e.target.id === 'gims-box')) return;
  if (e && e.preventDefault && !isOver) e.preventDefault();
  
  if (isOver) {
    restart();
  } else {
    if (mode === 'dragon') {
        pdy = -12;
    } else if (jumps < 2) {
      pdy = -24;
      jumps++;
    }
  }
}

canvas.addEventListener('touchstart', handle);
canvas.addEventListener('mousedown', handle);

restart();
update();
</script>
</body>
</html>
