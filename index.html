<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEYNEP FASHION TABLETTE</title>
<style>
  body { font-family: sans-serif; background-color: #ffd6f0; margin: 0; padding: 5px; text-align: center; }
  #game-box { background: white; border: 3px solid #ff8fd1; border-radius: 15px; width: 95%; margin: auto; padding: 10px; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

  /* Stats simplifiées pour tablette */
  #top-info { background: #fff0f9; padding: 5px; border-radius: 10px; margin-bottom: 5px; border: 1px solid #ffb6e6; }
  .stats { display: block; font-weight: bold; color: #d63384; font-size: 16px; }
  #lvl-bar { background: #eee; height: 10px; border-radius: 5px; margin: 5px auto; width: 80%; border: 1px solid #ccc; overflow: hidden; }
  #lvl-progress { background: #ff0080; width: 0%; height: 100%; }

  #btn-start-challenge { background: #ff0080; color: white; border: none; border-radius: 10px; padding: 10px; font-weight: bold; width: 100%; margin-bottom: 5px; font-size: 14px; }
  #challenge-area { background: #fff5ba; border: 2px dashed #ff0080; border-radius: 10px; padding: 5px; margin: 5px 0; display: none; }

  /* Le personnage - Tailles fixes pour éviter les bugs */
  #podium {
    position: relative; height: 280px; background: #fff;
    border: 2px solid #ffb6e6; border-radius: 15px; margin: 5px 0; overflow: hidden;
  }
  .body-part { position: absolute; background: #ffe0bd; left: 50%; margin-left: -20px; }
  #h-head { width: 35px; height: 35px; border-radius: 50%; top: 30px; z-index: 2; margin-left: -17px; }
  #h-torso { width: 32px; height: 65px; top: 65px; border-radius: 5px; z-index: 2; margin-left: -16px; }
  #h-leg-l { width: 12px; height: 80px; top: 130px; margin-left: -14px; z-index: 2; }
  #h-leg-r { width: 12px; height: 80px; top: 130px; margin-left: 2px; z-index: 2; }

  /* Emojis réduits pour que la tablette les lise bien */
  .cloth { position: absolute; width: 100%; text-align: center; left: 0; pointer-events: none; }
  #v-hair { top: -5px; font-size: 60px; z-index: 10; }
  #v-top  { top: 50px; font-size: 75px; z-index: 8; }
  #v-bot  { top: 100px; font-size: 85px; z-index: 7; }
  #v-shoe { top: 195px; font-size: 45px; z-index: 11; }
  #v-acc  { top: 35px; left: 35px; font-size: 35px; z-index: 12; width: auto; }
  #v-pet  { position: absolute; bottom: 20px; left: 15px; font-size: 45px; z-index: 15; }

  /* Grille de boutons plus stable */
  .title { font-size: 12px; font-weight: bold; color: #ff0080; text-align: left; margin: 10px 0 3px 0; }
  .row { 
    display: flex; overflow-x: scroll; white-space: nowrap; 
    padding: 5px; background: #fff9fc; border-radius: 10px; border: 1px solid #ffd6f0;
    margin-bottom: 5px; -webkit-overflow-scrolling: touch;
  }
  
  .btn { 
    min-width: 55px; height: 55px; font-size: 30px; background: white; 
    border: 2px solid #ffb6e6; border-radius: 10px; margin-right: 8px;
    flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
    position: relative; 
  }
  .lock::after { content: "🔒"; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.7); font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .price-tag { position: absolute; bottom: 0; background: #ff0080; color: white; font-size: 8px; padding: 1px 3px; border-radius: 5px; }

  .vote-btn { width: 100%; padding: 15px; background: #ff0080; color: white; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

<div id="game-box">
  <div id="top-info">
    <div class="stats">Niv. <span id="lvl">1</span> | 💰 <span id="coins">0</span></div>
    <div id="lvl-bar"><div id="lvl-progress"></div></div>
    <div style="color:#ff0080; font-size:12px; font-weight:bold;">Thème : <span id="t-text">...</span></div>
  </div>

  <button id="btn-start-challenge" onclick="lancerChallenge()">💎 LANCER UN DÉFI 💎</button>

  <div id="challenge-area">
    <div id="timer" style="font-size:20px;">00</div>
    <div id="m-reward" style="font-size:12px;">Gain : 0 💰</div>
  </div>

  <div id="podium">
    <div class="body-part" id="h-head"></div>
    <div class="body-part" id="h-torso"></div>
    <div class="body-part" id="h-leg-l"></div>
    <div class="body-part" id="h-leg-r"></div>
    <div class="cloth" id="v-hair"></div>
    <div class="cloth" id="v-top"></div>
    <div class="cloth" id="v-bot"></div>
    <div class="cloth" id="v-shoe"></div>
    <div class="cloth" id="v-acc"></div>
    <div id="v-pet"></div>
  </div>

  <div class="title">COIFFURES 👱‍♀️</div>
  <div class="row" id="row-hair"></div>

  <div class="title">HAUTS & ROBES 👗</div>
  <div class="row" id="row-top"></div>

  <div class="title">BAS & JUPES 👖</div>
  <div class="row" id="row-bot"></div>

  <div class="title">CHAUSSURES 👠</div>
  <div class="row" id="row-shoe"></div>

  <div class="title">ACCESSOIRES 💍</div>
  <div class="row" id="row-acc"></div>

  <div class="title">FAMILIERS 🦄</div>
  <div class="row" id="row-pet"></div>

  <button class="vote-btn" onclick="voter()">DÉFILER ! ✨</button>
</div>

<script>
  var coins = 0; var items = []; var level = 1; var exp = 0;
  var isMission = false; var currentMissionType = ""; var timerVal = 0;

  var themes = [
    "Princesse 🎀", "Rock 🎸", "Sirène 🌊", "Royal 👑", "Sport 👟", "Fée 🧚", "Mariage 💍", "Paris 👜", "Hiver ❄️", "Disco 💃",
    "Safari 🦁", "Galaxie 🚀", "Licorne 🦄", "Chef 🍳", "Héroïne ⚡", "Ange ☁️", "Halloween 🎃", "Noël 🎄", "Patineuse ⛸️", "Tennis 🎾",
    "Plage 🌺", "Manga 🌸", "Exploratrice 🌵", "Artiste 🎨", "Pyjama 🧸", "Égypte 🐍", "Cow-boy 🤠", "Bonbons 🍭", "Robot 🤖", "Pirate 🏴‍☠️",
    "Diamant 💎", "Neige ⛄", "Cyber 🦾", "Forêt 🌳", "Vilain 🦹", "Ballet 🩰", "Escrime 🤺", "Ferme 👩‍🌾", "Océan 🐠", "Peintre 🖌️",
    "Arc-en-ciel 🌈", "Cinéma 🎬", "Vintage 📼", "Gala 🥂", "Étoiles 🌌", "Pop 🎙️", "Corée 🌸", "Japon 👘", "Pluie ☔", "Diva 💎"
  ]; // J'ai réduit la liste ici pour le code, mais elle tourne en boucle.

  const shop = {
    hair: ["💇","👱","👧","👩","👸","👰","🤶","🧕"],
    top: ["👚","👕","👘","🥻","👗","👙","🩰","👮‍♀️","🦸‍♀️"],
    bot: ["👖","🩳","👗","👰","👘"],
    shoe: ["👠","👟","👢","👞","🥿","👡","⛸️"],
    acc: ["💍","👑","💎","✨","👒","👓","🕶️","🧣","👜"],
    pet: ["🐱","🐶","🐰","🦄","🐲","👾","🎈","🪦","🐯","🐧"]
  };

  function initShop() {
    Object.keys(shop).forEach(cat => {
      let row = document.getElementById('row-'+cat);
      row.innerHTML = `<button class="btn" onclick="set('${cat}','')">❌</button>`;
      shop[cat].forEach((emoji, i) => {
        let price = (i < 2) ? 0 : (i * 50);
        let id = cat + i;
        let btn = document.createElement('button');
        btn.className = "btn " + (price > 0 ? "lock" : "");
        btn.id = id;
        btn.innerHTML = emoji + (price > 0 ? `<span class="price-tag">${price}</span>` : "");
        btn.onclick = () => (cat === 'pet') ? buyPet(emoji, id, price) : buy(cat, emoji, id, price);
        row.appendChild(btn);
      });
    });
  }

  function set(part, icon) { document.getElementById('v-' + part).innerHTML = icon; }
  function setPet(icon) { document.getElementById('v-pet').innerHTML = icon; }
  function updateStats() { document.getElementById('coins').innerText = coins; document.getElementById('lvl').innerText = level; document.getElementById('lvl-progress').style.width = exp + "%"; }

  function buy(part, icon, id, price) {
    if (items.indexOf(id) !== -1 || price === 0) { set(part, icon); } 
    else if (coins >= price) { coins -= price; items.push(id); updateStats(); document.getElementById(id).className = "btn"; set(part, icon); }
  }

  function buyPet(icon, id, price) {
    if (items.indexOf(id) !== -1 || price === 0) { setPet(icon); } 
    else if (coins >= price) { coins -= price; items.push(id); updateStats(); document.getElementById(id).className = "btn"; setPet(icon); }
  }

  function lancerChallenge() {
    if(isMission) return;
    let r = Math.random();
    if(r < 0.33) startMission("FLASH", 10, 200);
    else if(r < 0.66) startMission("STYL", 30, 90);
    else startMission("GRANDE", 60, 350);
  }

  function startMission(type, seconds, reward) {
    isMission = true; currentMissionType = type; timerVal = seconds;
    document.getElementById('challenge-area').style.display = "block";
    document.getElementById('btn-start-challenge').style.display = "none";
    let cd = setInterval(() => {
      timerVal--; document.getElementById('timer').innerText = timerVal;
      if (timerVal <= 0 || !isMission) { clearInterval(cd); if(isMission) { alert("Temps fini !"); endMission(false); } }
    }, 1000);
  }

  function endMission(success) {
    isMission = false; document.getElementById('challenge-area').style.display = "none";
    document.getElementById('btn-start-challenge').style.display = "block";
    if (success) {
      let r = (currentMissionType == "FLASH") ? 200 : (currentMissionType == "STYL") ? 90 : 350;
      coins += r; alert("Gagné ! + " + r); updateStats();
    }
  }

  function voter() {
    let score = Math.floor(Math.random() * 20) + 30;
    if (isMission) endMission(true); else coins += 25;
    exp += 25; if(exp >= 100) { level++; exp = 0; }
    updateStats();
    alert("Note : " + score + "/50");
    document.getElementById('t-text').innerText = themes[Math.floor(Math.random() * themes.length)];
  }

  initShop();
  document.getElementById('t-text').innerText = themes[0];
  updateStats();
</script>

</body>
</html>
