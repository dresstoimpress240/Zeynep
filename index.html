<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZEYNEP RUN 4.4</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
  #ui { position: absolute; top: 10px; left: 10px; color: gold; font-size: 30px; font-family: sans-serif; font-weight: bold; }
  #gims { position: absolute; top: 5px; right: 5px; border: 1px solid #fff; }
</style>
</head>
<body>

<div id="ui">SAC: <span id="val">0</span></div>

<div id="gims">
  <iframe width="120" height="70" src="https://www.youtube.com/embed/ERk4Lx-mOqQ" frameborder="0"></iframe>
</div>

<canvas id="game"></canvas>

<script>
// VERSION ANTI-RAM POUR ANDROID 2014
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var valScore = document.getElementById('val');

var w = window.innerWidth;
var h = window.innerHeight;
canvas.width = w;
canvas.height = h;

var score = 0;
var speed = 6; // Plus lent au début pour la tablette
var isOver = false;
var py = h - 150;
var pdy = 0;
var jumps = 0;
var obs = [];

function restart() {
  score = 0; speed = 6; isOver = false; py = h - 150; pdy = 0; obs = [];
  valScore.innerHTML = "0";
}

function spawn() {
  if (isOver) return;
  var x = w + 50;
  var r = Math.random();
  var type = 'coin';
  var em = "O"; // Texte simple pour ne pas ramer
  var col = "yellow";
  
  if (r < 0.5) { type = 'danger'; em = "X"; col = "red"; }
  else if (r < 0.8) { type = 'gift'; em = "?"; col = "pink"; }
  
  obs.push({ x: x, y: h - 110, type: type, em: em, col: col });
}

function loop() {
  ctx.clearRect(0, 0, w, h);
  
  // Fond bleu nuit simple
  ctx.fillStyle = "#050a1e";
  ctx.fillRect(0, 0, w, h);
  
  // Sol rose
  ctx.fillStyle = "#ff0055";
  ctx.fillRect(0, h - 50, w, 50);

  if (!isOver) {
    speed += 0.001;
    pdy += 1.5;
    py += pdy;
    
    if (py > h - 130) {
      py = h - 130;
      pdy = 0;
      jumps = 0;
    }

    if (Math.random() < 0.02) spawn();

    for (var i = 0; i < obs.length; i++) {
      var o = obs[i];
      o.x -= speed;
      
      // Dessin des obstacles (cercles colorés au lieu d'emojis pour la vitesse)
      ctx.fillStyle = o.col;
      ctx.beginPath();
      ctx.arc(o.x, o.y, 25, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.font = "20px Arial";
      ctx.fillText(o.em, o.x - 5, o.y + 7);

      // Collision simplifiée
      if (o.x < 120 && o.x > 40 && py > o.y - 60 && py < o.y + 20) {
        if (o.type === 'danger') {
          isOver = true;
        } else {
          score += 10;
          valScore.innerHTML = score;
          obs.splice(i, 1);
        }
      }
      if (o.x < -50) obs.splice(i, 1);
    }
  }

  // Princesse (Rectangle rose avec texte pour éviter les bugs d'images)
  ctx.fillStyle = "#ff69b4";
  ctx.fillRect(60, py, 50, 50);
  ctx.fillStyle = "#fff";
  ctx.font = "35px Arial";
  ctx.fillText("P", 72, py + 38);

  if (isOver) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,w,h);
    ctx.fillStyle = "#fff";
    ctx.font = "40px Arial";
    ctx.fillText("REVANCHE !", w/2 - 100, h/2);
  }

  setTimeout(function() {
    requestAnimationFrame(loop);
  }, 1000 / 30); // Limite à 30 images par seconde pour ne pas chauffer
}

function action(e) {
  if (e) e.preventDefault();
  if (isOver) {
    restart();
  } else {
    if (jumps < 2) {
      pdy = -22;
      jumps++;
    }
  }
}

window.addEventListener('touchstart', action);
window.addEventListener('mousedown', action);

restart();
loop();
</script>
</body>
</html>
