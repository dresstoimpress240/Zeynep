<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DTI - PRESTIGE INFINITY</title>
<style>
  body { font-family: sans-serif; background-color: #ffd6f0; margin: 0; padding: 10px; text-align: center; }
  #card { background: white; border: 4px solid #ff8fd1; border-radius: 20px; max-width: 380px; margin: auto; padding: 10px; box-shadow: 0 8px 0 #ffb6e6; }
  
  #top-bar { display: flex; justify-content: space-between; background: #fff0f9; padding: 10px; border-radius: 15px; border: 2px solid #ffb6e6; margin-bottom: 10px; }
  #money { color: #d63384; font-weight: bold; font-size: 18px; }
  #theme { color: #ff0080; font-weight: bold; font-size: 13px; }

  #stage {
    position: relative; height: 300px; background: #fff; border: 2px solid #ffb6e6; border-radius: 15px; margin-bottom: 10px; overflow: hidden;
  }

  .part { position: absolute; background: #ffe0bd; border: 1px solid #f3cbb1; left: 50%; transform: translateX(-50%); }
  #head { width: 40px; height: 40px; border-radius: 50%; top: 15px; z-index: 2; }
  #torso { width: 36px; height: 60px; top: 55px; border-radius: 5px; z-index: 2; }
  .arm { position: absolute; width: 9px; height: 50px; background: #ffe0bd; border: 1px solid #f3cbb1; top: 60px; border-radius: 5px; z-index: 1; }
  #arm-l { left: 50%; margin-left: -28px; transform: rotate(8deg); }
  #arm-r { left: 50%; margin-left: 19px; transform: rotate(-8deg); }
  #leg-l { width: 12px; height: 80px; top: 115px; margin-left: -10px; border-radius: 0 0 5px 5px; z-index: 2; }
  #leg-r { width: 12px; height: 80px; top: 115px; margin-left: 10px; border-radius: 0 0 5px 5px; z-index: 2; }

  .item { position: absolute; width: 100%; text-align: center; pointer-events: none; }
  #v-hair { top: -10px; font-size: 70px; z-index: 10; }
  #v-top  { top: 40px; font-size: 85px; z-index: 8; }
  #v-bot  { top: 90px; font-size: 95px; z-index: 7; }
  #v-shoe { top: 180px; font-size: 55px; z-index: 11; }
  #v-acc  { top: 35px; left: 35px; font-size: 40px; z-index: 12; }

  .label { font-size: 11px; font-weight: bold; color: #ff0080; text-align: left; margin: 8px 0 3px 5px; }
  .scroll { display: flex; overflow-x: auto; padding: 5px; background: #fff9fc; border-radius: 12px; border: 1px solid #ffd6f0; margin-bottom: 5px; }
  .btn { min-width: 58px; height: 58px; font-size: 32px; margin-right: 8px; background: white; border: 2px solid #ffb6e6; border-radius: 12px; flex-shrink: 0; position: relative; }
  
  .locked::after { content: "🔒"; position: absolute; top: 0; left: 0; font-size: 16px; background: rgba(255,255,255,0.6); width: 100%; height: 100%; display: flex; align-items:center; justify-content:center; border-radius: 10px; }

  .big-btn { width: 100%; padding: 15px; background: #ff0080; color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; margin-top: 5px; box-shadow: 0 4px 0 #b5065e; }
  #confetti { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; font-size: 25px; }
</style>
</head>
<body>

<div id="card">
  <div id="top-bar">
    <div id="theme"><span id="t-text">...</span></div>
    <div id="money">💰 <span id="coins">0</span></div>
  </div>

  <div id="stage">
    <div id="confetti">🌈💎🍭🦄🎆✨</div>
    <div class="part" id="head"></div>
    <div class="part" id="torso"></div>
    <div class="arm" id="arm-l"></div>
    <div class="arm" id="arm-r"></div>
    <div class="part" id="leg-l"></div>
    <div class="part" id="leg-r"></div>

    <div class="item" id="v-hair"></div>
    <div class="item" id="v-top"></div>
    <div class="item" id="v-bot"></div>
    <div class="item" id="v-shoe"></div>
    <div class="item" id="v-acc"></div>
  </div>

  <div class="label">COIFFURES 💇</div>
  <div class="scroll">
    <button class="btn" onclick="set('hair','')">❌</button>
    <button class="btn" onclick="set('hair','💇')">💇</button>
    <button class="btn" onclick="set('hair','👱')">👱</button>
    <button class="btn" onclick="set('hair','👧')">👧</button>
    <button class="btn" onclick="set('hair','👩')">👩</button>
    <button class="btn locked" id="L1" onclick="buy('hair','👸','L1', 50)">👸</button>
  </div>

  <div class="label">HAUTS & ROBES 👗</div>
  <div class="scroll">
    <button class="btn" onclick="set('top','')">❌</button>
    <button class="btn" onclick="set('top','👚')">👚</button>
    <button class="btn" onclick="set('top','👕')">👕</button>
    <button class="btn" onclick="set('top','🧥')">🧥</button>
    <button class="btn" onclick="set('top','👘')">👘</button>
    <button class="btn locked" id="L2" onclick="buy('top','👙','L2', 100)">👙</button>
  </div>

  <div class="label">BAS & JUPES 👖</div>
  <div class="scroll">
    <button class="btn" onclick="set('bot','')">❌</button>
    <button class="btn" onclick="set('bot','👖')">👖</button>
    <button class="btn" onclick="set('bot','👗')">👗</button>
    <button class="btn" onclick="set('bot','🩳')">🩳</button>
    <button class="btn" onclick="set('bot','👙')">👙</button>
    <button class="btn locked" id="L3" onclick="buy('bot','👰','L3', 200)">👰</button>
  </div>

  <div class="label">CHAUSSURES & SACS 👜</div>
  <div class="scroll">
    <button class="btn" onclick="set('shoe','')">❌</button>
    <button class="btn" onclick="set('shoe','👠')">👠</button>
    <button class="btn" onclick="set('shoe','👟')">👟</button>
    <button class="btn" onclick="set('shoe','👢')">👢</button>
    <button class="btn" onclick="set('acc','👜')">👜</button>
    <button class="btn locked" id="L4" onclick="buy('acc','👑','L4', 80)">👑</button>
    <button class="btn locked" id="L5" onclick="buy('acc','💍','L5', 150)">💍</button>
  </div>

  <button class="big-btn" onclick="valider()">DÉFILER ! ✨</button>
</div>

<script>
  var coins = 0;
  var items = [];
  var themes = [
    "Bal Royal 👑", "Sport Chic 👟", "Mariage de Rêve 💍", "Sirène Perdue 🌊", 
    "Star du Rock 🎸", "Pyjama Party 🧸", "Look d'Hiver ❄️", "Voyage au Japon 👘",
    "Bal Masqué 🎭", "Princesse Rose 🎀", "Vacances à Paris 👜", "Style Manga 🌸",
    "Fée des Bois 🧚", "Soirée Disco 💃", "Exploratrice 🌵", "Chef de Cuisine 🍳",
    "Super Héroïne ⚡", "Ange du Ciel ☁️", "Halloween 🎃", "Noël Magique 🎄",
    "Safari Africain 🦁", "Patineuse Artistique ⛸️", "Espace & Galaxie 🚀", "Licorne Magique 🦄",
    "Bébé Glamour 🍼", "Artiste Peintre 🎨", "Tennis Star 🎾", "Plage Hawaïenne 🌺",
    "Château Hanté 👻", "Journaliste Mode 🎤"
  ];

  function set(part, icon) {
    document.getElementById('v-' + part).innerHTML = icon;
  }

  function buy(part, icon, id, price) {
    if (items.indexOf(id) !== -1) { set(part, icon); } 
    else if (coins >= price) {
      coins -= price; items.push(id);
      document.getElementById('coins').innerText = coins;
      document.getElementById(id).classList.remove('locked');
      set(part, icon);
    } else { alert("Pas assez de sous !"); }
  }

  function valider() {
    // Score aléatoire de 0 à 20 !
    var score = Math.floor(Math.random() * 21); 
    var gain = score * 7;
    coins += gain;
    document.getElementById('coins').innerText = coins;
    
    var conf = document.getElementById('confetti');
    conf.style.display = "block";
    
    var comment = "";
    if(score < 5) comment = "Oups... Le jury n'aime pas trop. 🙊";
    else if(score < 10) comment = "Pas mal ! Continue ! 👍";
    else if(score < 15) comment = "Trop stylée ! ✨";
    else if(score < 20) comment = "INCROYABLE ! 😍";
    else comment = "SCORE LÉGENDAIRE ! 🏆 20/10 !";

    alert("NOTE : " + score + "/10\n" + comment + "\nGain : " + gain + " pièces ! 💰");
    
    setTimeout(function() {
      conf.style.display = "none";
      document.getElementById('t-text').innerText = themes[Math.floor(Math.random() * themes.length)];
      set('hair',''); set('top',''); set('bot',''); set('shoe',''); set('acc','');
    }, 1200);
  }

  document.getElementById('t-text').innerText = themes[Math.floor(Math.random() * themes.length)];
</script>

</body>
</html>
