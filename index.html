<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZEYNEP RUN 2014</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
  canvas { display: block; background: #050a1e; width: 100%; height: 100%; }
  
  #music-player { 
    position: absolute; top: 5px; right: 5px; 
    z-index: 100; background: #ff0055; 
    padding: 5px; border: 2px solid #fff; border-radius: 10px;
  }
  #score-ui { 
    position: absolute; top: 20px; left: 20px; color: #fff; 
    font-size: 40px; font-weight: bold; z-index: 10;
  }
</style>
</head>
<body>

<div id="score-ui">💰 <span id="val">0</span></div>

<div id="music-player">
  <iframe width="140" height="80" src="https://www.youtube.com/embed/ERk4Lx-mOqQ" frameborder="0"></iframe>
</div>

<canvas id="game"></canvas>

<script>
// CODE COMPATIBLE ANDROID 4.4 (ES5)
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var valScore = document.getElementById('val');

var w = window.innerWidth;
var h = window.innerHeight;
canvas.width = w;
canvas.height = h;

var score = 0;
var speed = 7;
var isOver = false;
var frame = 0;
var py = h - 200;
var pdy = 0;
var jumps = 0;
var obs = [];

function spawn() {
  var x = w + 100;
  var r = Math.random();
  var type = 'coin';
  var em = "🟡";
  
  if (r < 0.4) { type = 'danger'; em = "🌵"; }
  else if (r < 0.7) { type = 'gift'; em = "🎁"; }
  
  obs.push({ x: x, y: h - 140, type: type, em: em });
}

function update() {
  if (!isOver) {
    frame++;
    speed += 0.002;
    pdy += 1.2;
    py += pdy;
    
    if (py > h - 140) {
      py = h - 140;
      pdy = 0;
      jumps = 0;
    }
    
    if (frame % 50 === 0) spawn();
    
    for (var i = 0; i < obs.length; i++) {
      var o = obs[i];
      o.x -= speed;
      
      // Collision simple
      if (80 < o.x + 50 && 80 + 60 > o.x && py < o.y + 50 && py + 60 > o.y) {
        if (o.type === 'coin') {
          score += 50;
          valScore.innerHTML = score;
          obs.splice(i, 1);
        } else if (o.type === 'danger') {
          isOver = true;
        } else {
          score += 100;
          obs.splice(i, 1);
        }
      }
      if (o.x < -100) obs.splice(i, 1);
    }
  }
  draw();
  setTimeout(update, 20); // Utilisation de setTimeout pour les vieux Android
}

function draw() {
  ctx.fillStyle = "#050a1e";
  ctx.fillRect(0, 0, w, h);
  
  // Sol
  ctx.fillStyle = "#ff0055";
  ctx.fillRect(0, h - 60, w, 60);
  
  // Obstacles
  ctx.font = "50px Arial";
  for (var j = 0; j < obs.length; j++) {
    ctx.fillText(obs[j].em, obs[j].x, obs[j].y + 40);
  }
  
  // Princesse
  ctx.font = "70px Arial";
  ctx.fillText("👸", 80, py + 50);
  
  if (isOver) {
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = "#fff";
    ctx.font = "40px Arial";
    ctx.fillText("REVANCHE", w/2 - 100, h/2);
  }
}

function action() {
  if (isOver) {
    score = 0; speed = 7; isOver = false; py = h - 200; obs = [];
    valScore.innerHTML = "0";
  } else {
    if (jumps < 2) {
      pdy = -20;
      jumps++;
    }
  }
}

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  action();
});
canvas.addEventListener('mousedown', action);

update();

</body>
</html>
