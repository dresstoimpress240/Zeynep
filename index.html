<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZEYNEP FASHION EMPIRE V2.1</title>
<style>
  body { font-family: 'Helvetica Neue', sans-serif; background-color: #ffdeef; margin: 0; padding: 10px; text-align: center; color: #444; }
  #game-box { background: #fff; border: 6px solid #ff8fd1; border-radius: 30px; max-width: 500px; margin: auto; padding: 15px; box-shadow: 0 15px 30px rgba(255,100,180,0.3); }
  #top-info { background: linear-gradient(#fff0f9, #ffe4f2); padding: 15px; border-radius: 25px; border: 2px solid #ffb6e6; margin-bottom: 15px; }
  .stats { display: flex; justify-content: space-around; font-weight: 900; color: #ff0080; font-size: 20px; }
  #lvl-bar { background: #ffd1eb; height: 16px; border-radius: 10px; overflow: hidden; border: 2px solid #ff8fd1; margin-top:10px;}
  #lvl-progress { background: linear-gradient(to right, #ff0080, #ffb0d9); width: 0%; height: 100%; transition: 0.6s; }
  .btn-container { display: flex; justify-content: space-around; margin-bottom: 15px; gap: 10px; }
  .btn-main { flex: 1; height: 50px; color: white; border: 3px solid #fff; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 0 #b5065e; }
  #btn-vip { background: linear-gradient(#ff0080, #ff6eb4); }
  #btn-roue { background: linear-gradient(#ffcc00, #ff9900); box-shadow: 0 4px 0 #a37a00; }
  #podium { position: relative; height: 350px; background: radial-gradient(circle, #ffffff, #fff0f9); border: 4px solid #ffd6ed; border-radius: 25px; margin-bottom: 15px; overflow: hidden; display: flex; justify-content: center; }
  .body-part { position: absolute; background: #ffe0bd; border: 1px solid #f3cbb1; left: 50%; transform: translateX(-50%); }
  #h-head { width: 50px; height: 50px; border-radius: 50%; top: 30px; z-index: 2; }
  #h-torso { width: 45px; height: 80px; top: 78px; border-radius: 10px; z-index: 2; }
  .h-arm { position: absolute; width: 12px; height: 65px; background: #ffe0bd; border: 1px solid #f3cbb1; top: 80px; border-radius: 6px; z-index: 1; }
  #h-arm-l { left: 50%; margin-left: -35px; transform: rotate(10deg); }
  #h-arm-r { left: 50%; margin-left: 23px; transform: rotate(-10deg); }
  #h-leg-l { width: 18px; height: 100px; top: 155px; margin-left: -13px; border-radius: 0 0 6px 6px; z-index: 2; }
  #h-leg-r { width: 18px; height: 100px; top: 155px; margin-left: 13px; border-radius: 0 0 6px 6px; z-index: 2; }
  .cloth { position: absolute; width: 100%; text-align: center; pointer-events: none; left: 0; }
  #v-hair { top: -10px; font-size: 95px; z-index: 10; }
  #v-top { top: 60px; font-size: 110px; z-index: 8; }
  #v-bot { top: 130px; font-size: 120px; z-index: 7; }
  #v-shoe { top: 240px; font-size: 70px; z-index: 11; }
  #v-acc { top: 40px; left: 50px; font-size: 55px; z-index: 12; }
  .title { font-size: 14px; font-weight: bold; color: #ff0080; text-align: left; margin: 10px 0 8px 5px; background: #fff; padding: 2px 10px; border-radius: 10px; display: inline-block; border: 1px solid #ffb6e6;}
  .row { display: flex; overflow-x: auto; padding: 12px 5px; background: #fffcfd; border-radius: 20px; border: 2px dashed #ffd6f0; margin-bottom: 10px; }
  .btn-item { min-width: 75px; height: 75px; font-size: 45px; margin-right: 15px; background: white; border: 3px solid #ffcce8; border-radius: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 4px 0 #ffd6f0; }
  .lock::after { content: "🔒"; position: absolute; font-size: 22px; background: rgba(255,255,255,0.7); width: 100%; height: 100%; display: flex; align-items:center; justify-content:center; border-radius: 17px; }
  #btn-defiler { background: linear-gradient(#ff0080, #ff4bad); color: white; width: 100%; height: 70px; border-radius: 25px; border: 4px solid #fff; font-size: 24px; font-weight: 900; box-shadow: 0 6px 0 #b5065e; margin-top: 10px; }
  #win-screen { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; border:8px solid #ff0080; padding:30px; z-index:100; border-radius:30px; width:85%; box-shadow: 0 0 100px rgba(0,0,0,0.6); }
</style>
</head>
<body>
<div id="game-box">
  <div id="top-info">
    <div class="stats"><span>👑 Niv. <span id="lvl">1</span></span><span>💰 <span id="coins">0</span></span></div>
    <div id="lvl-bar"><div id="lvl-progress"></div></div>
    <div style="color:#ff0080; font-size:16px; font-weight:bold; margin-top:8px;">Thème : <span id="t-text">...</span></div>
  </div>
  <div class="btn-container">
    <button id="btn-vip" class="btn-main" onclick="lancerQuete()">✨ QUÊTE VIP</button>
    <button id="btn-roue" class="btn-main" onclick="roue()">🎡 ROUE (1000💰)</button>
  </div>
  <div id="podium">
    <div class="body-part" id="h-head"></div><div class="body-part" id="h-torso"></div>
    <div class="h-arm" id="h-arm-l"></div><div class="h-arm" id="h-arm-r"></div>
    <div class="body-part" id="h-leg-l"></div><div class="body-part" id="h-leg-r"></div>
    <div class="cloth" id="v-hair"></div><div class="cloth" id="v-top"></div>
    <div class="cloth" id="v-bot"></div><div class="cloth" id="v-shoe"></div>
    <div class="cloth" id="v-acc"></div>
  </div>
  <div class="title">Coiffures 💇‍♀️</div>
  <div class="row">
    <button class="btn-item" onclick="set('hair','')">❌</button><button class="btn-item" onclick="set('hair','💇')">💇</button><button class="btn-item" onclick="set('hair','👱')">👱</button><button class="btn-item" onclick="set('hair','👧')">👧</button>
    <button class="btn-item lock" id="L1" onclick="buy('hair','👸','L1',50)">👸</button><button class="btn-item lock" id="L5" onclick="buy('hair','👰','L5',150)">👰</button><button class="btn-item lock" id="L20" onclick="buy('hair','🧚‍♀️','L20',500)">🧚‍♀️</button><button class="btn-item lock" id="L30" onclick="buy('hair','🧝‍♀️','L30',600)">🧝‍♀️</button><button class="btn-item lock" id="L40" onclick="buy('hair','🧜‍♀️','L40',700)">🧜‍♀️</button>
  </div>
  <div class="title">Hauts & Robes 👗</div>
  <div class="row">
    <button class="btn-item" onclick="set('top','')">❌</button><button class="btn-item" onclick="set('top','👚')">👚</button><button class="btn-item" onclick="set('top','👕')">👕</button>
    <button class="btn-item lock" id="L2" onclick="buy('top','👗','L2',100)">👗</button><button class="btn-item lock" id="L7" onclick="buy('top','👙','L7',60)">👙</button><button class="btn-item lock" id="L21" onclick="buy('top','💃','L21',400)">💃</button><button class="btn-item lock" id="L25" onclick="buy('top','👘','L25',300)">👘</button><button class="btn-item lock" id="L45" onclick="buy('top','🌟','L45',500)">🌟</button>
  </div>
  <div class="title">Bas & Chaussures 👠</div>
  <div class="row">
    <button class="btn-item" onclick="set('bot','')">❌</button><button class="btn-item" onclick="set('bot','👖')">👖</button><button class="btn-item" onclick="set('shoe','👠')">👠</button><button class="btn-item" onclick="set('shoe','👟')">👟</button>
    <button class="btn-item lock" id="L3" onclick="buy('bot','👰','L3',200)">👰</button><button class="btn-item lock" id="L22" onclick="buy('shoe','🛼','L22',300)">🛼</button><button class="btn-item lock" id="L46" onclick="buy('shoe','👢','L46',200)">👢</button>
  </div>
  <div class="title">Accessoires ✨</div>
  <div class="row">
    <button class="btn-item" onclick="set('acc','')">❌</button><button class="btn-item" onclick="set('acc','💍')">💍</button><button class="btn-item" onclick="set('acc','👒')">👒</button>
    <button class="btn-item lock" id="L4" onclick="buy('acc','👑','L4',80)">👑</button><button class="btn-item lock" id="L10" onclick="buy('acc','💎','L10',300)">💎</button><button class="btn-item lock" id="L23" onclick="buy('acc','👜','L23',150)">👜</button><button class="btn-item lock" id="L44" onclick="buy('acc','🎈','L44',200)">🎈</button><button class="btn-item lock" id="L58" onclick="buy('acc','🌈','L58',900)">🌈</button>
  </div>
  <button id="btn-defiler" onclick="voter()">DÉFILER ! ✨</button>
</div>
<div id="win-screen"><h2 style="color:#ff0080">🎡 ROUE MAGIQUE !</h2><p id="win-txt"></p><button class="btn-main" style="width:100%; height:60px; font-size:20px; background: #ff0080;" onclick="document.getElementById('win-screen').style.display='none'">MERCI ! ✨</button></div>
<script>
  var coins=0, items=[], exp=0, lvl=1, qActive=false, qBonus=0, timerVal=0, interval;
  var th=["Princesse 🎀","Rock 🎸","Sirène 🌊","Bal 👑","Sport 👟","Fée 🧚","Mariage 💍","Paris 👜","Hiver ❄️","Disco 💃","Safari 🦁","Galaxie 🚀","Licorne 🦄","Chef 🍳","Héroïne ⚡","Ange ☁️","Halloween 🎃","Noël 🎄","Patineuse ⛸️","Tennis 🎾","Plage 🌺","Château 👻","Journaliste 🎤","Manga 🌸","Exploratrice 🌵","Artiste 🎨","Pyjama 🧸","Masqué 🎭","Égypte 🐍","Cow-boy 🤠","Bonbons 🍭","Futur 🤖","Chat 🐱","Jungle 🌿","Danseuse 🩰","Pirate 🏴‍C","Papillon 🦋","Pop 🎙️","Grecque 🏛️","Été ☀️","Glace ❄️","Gothique 🖤","Street 👟","Vampire 🧛‍♀️","Ninja 🥷","Rose 🍭","Perdue 🐚","Poupée 🧸","Nuit 🌙","Promo 💃","Pop Culture 🎙️","Corée 🌸","Vintage 🌈","Punk 🖤","Coeur ❤️","Japon 👘","Pluie ☔","Safari 🦄","Diva 💎","Étoiles 🌌"];
  function set(p,i){document.getElementById('v-'+p).innerHTML=i;}
  function up(){document.getElementById('coins').innerText=coins;document.getElementById('lvl').innerText=lvl;document.getElementById('lvl-progress').style.width=exp+"%";}
  function buy(p,i,id,pr){if(items.includes(id)){set(p,i);}else if(coins>=pr){coins-=pr;unlock(id);set(p,i);}}
  function unlock(id){if(!items.includes(id)){items.push(id);let el=document.getElementById(id);if(el)el.classList.remove('lock');up();}}
  function lancerQuete(){
    if(qActive) return;
    qActive = true; let r = Math.random();
    if(r < 0.15) { qBonus = 500; timerVal = 60; alert("💎 GRANDE QUÊTE\n60s pour 500💰 !"); }
    else if(r < 0.5) { qBonus = 350; timerVal = 10; alert("⚡ QUÊTE RAPIDE\n10s pour 350💰 !"); }
    else { qBonus = 90; timerVal = 30; alert("👗 QUÊTE STANDARD\n30s pour 90💰 !"); }
    interval = setInterval(()=>{
      timerVal--; document.getElementById('btn-vip').innerText = "⏳ " + timerVal + "s";
      if(timerVal <= 0){ clearInterval(interval); qActive = false; document.getElementById('btn-vip').innerText = "❌ ÉCHEC"; setTimeout(()=> { document.getElementById('btn-vip').innerText = "✨ QUÊTE VIP"; }, 2000); }
    }, 1000);
  }
  function roue(){
    if(coins < 1000){alert("Il te faut 1000💰 !");return;} coins -= 1000; up();
    if(Math.random() < 0.3) { coins += 1000; up(); document.getElementById('win-txt').innerText = "JACKPOT ! Remboursé !"; }
    else { 
      var lks = Array.from(document.querySelectorAll('.lock')); if(lks.length < 2){ coins += 1000; up(); return; }
      var r1 = lks.splice(Math.floor(Math.random()*lks.length),1)[0], r2 = lks[Math.floor(Math.random()*lks.length)];
      unlock(r1.id); unlock(r2.id); document.getElementById('win-txt').innerText = "CADEAU : "+r1.innerText+" et "+r2.innerText;
    }
    document.getElementById('win-screen').style.display='block';
  }
  function voter(){
    let gain = 30;
    if(qActive){ clearInterval(interval); gain = qBonus; qActive = false; document.getElementById('btn-vip').innerText = "✅ BRAVO !"; setTimeout(()=> { document.getElementById('btn-vip').innerText = "✨ QUÊTE VIP"; }, 2000); }
    coins += gain; exp += 25; if(exp >= 100){ lvl++; exp = 0; } up();
    setTimeout(()=>{ document.getElementById('t-text').innerText = th[Math.floor(Math.random()*th.length)]; set('hair','');set('top','');set('bot','');set('shoe','');set('acc',''); }, 800);
  }
  document.getElementById('t-text').innerText = th[0]; up();
</script>
</body>
</html>
