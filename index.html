<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZEYNEP GIMS GOLD</title>
<style>
  * { -webkit-touch-callout: none; -webkit-user-select: none; touch-action: none; }
  body { margin: 0; background: #050a1e; overflow: hidden; font-family: sans-serif; }
  canvas { display: block; width: 100%; height: 100%; }
  
  #ui { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 40px; font-weight: bold; z-index: 10; pointer-events: none; }

  /* LE BOUTON MAGIQUE QUI JOUE LE SON SANS QUITTER */
  #play-gims { 
    position: absolute; top: 10px; right: 10px; 
    z-index: 1000; background: #ff0055; color: white;
    padding: 12px; border: 3px solid white; border-radius: 12px;
    font-weight: bold; font-size: 16px; cursor: pointer;
  }
  /* On cache la video mais on garde le son actif */
  #gims-hidden { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
</style>
</head>
<body>

<div id="ui">💰 <span id="val">0</span></div>

<button id="play-gims" onclick="startMusic()">🎵 JOUER GIMS</button>

<div id="gims-hidden">
  <iframe id="youtube-player" width="100" height="100" src="https://www.youtube.com/embed/ERk4Lx-mOqQ?enablejsapi=1" frameborder="0"></iframe>
</div>

<canvas id="game"></canvas>

<script>
// Fonction pour lancer la musique sans quitter le jeu
function startMusic() {
    var player = document.getElementById('youtube-player');
    // On renvoie le lien avec autoplay pour forcer le son
    player.src += "&autoplay=1";
    document.getElementById('play-gims').style.display = 'none'; // Cache le bouton après clic
}

var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var valScore = document.getElementById('val');
var w = window.innerWidth, h = window.innerHeight;
canvas.width = w; canvas.height = h;

var score = 0, speed = 8, isOver = false, frame = 0, py = h - 200, pdy = 0, jumps = 0, mode = 'normal', modeTimer = 0, obs = [];

function restart() {
  score = 0; speed = 8; isOver = false; frame = 0;
  py = h - 250; pdy = 0; mode = 'normal'; modeTimer = 0;
  obs = []; valScore.innerHTML = "0";
}

function spawn() {
  var x = w + 100, r = Math.random(), type = 'coin', em = "🟡";
  if (r < 0.45) { type = 'danger'; em = (Math.random() > 0.5 ? "🌵" : "👾"); }
  else if (r < 0.8) { type = 'gift'; em = "🎁"; }
  obs.push({ x: x, y: h - 145, type: type, em: em });
}

function update() {
  if (!isOver) {
    frame++; speed += 0.003;
    if (modeTimer > 0) modeTimer--; else mode = 'normal';
    pdy += (mode === 'dragon' ? 0.4 : 1.2);
    py += pdy;
    if (py > h - 145) { py = h - 145; pdy = 0; jumps = 0; }
    if (frame % 45 === 0) spawn();
    for (var i = 0; i < obs.length; i++) {
      var o = obs[i]; o.x -= speed;
      if (100 < o.x + 60 && 100 + 70 > o.x && py < o.y + 60 && py + 70 > o.y) {
        if (o.type === 'coin') { score += 50; valScore.innerHTML = score; obs.splice(i, 1); }
        else if (o.type === 'gift') { mode = ['giant', 'dragon', 'ghost'][Math.floor(Math.random()*3)]; modeTimer = 300; obs.splice(i, 1); }
        else { if (mode === 'giant') { score += 100; obs.splice(i, 1); } else if (mode !== 'ghost') isOver = true; }
      }
      if (o.x < -150) obs.splice(i, 1);
    }
  }
  draw();
  requestAnimationFrame(update);
}

function draw() {
  ctx.fillStyle = (mode === 'ghost' ? "#000" : "#050a1e");
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = "hsl(" + (frame % 360) + ", 100%, 50%)";
  ctx.fillRect(0, h - 65, w, 10);
  ctx.fillStyle = "#000"; ctx.fillRect(0, h - 55, w, 55);
  ctx.font = "70px Arial";
  for (var j = 0; j < obs.length; j++) ctx.fillText(obs[j].em, obs[j].x, obs[j].y + 50);
  var pChar = "👸";
  if (mode === 'dragon') pChar = "🐲";
  if (mode === 'ghost') { pChar = "👻"; ctx.globalAlpha = 0.5; }
  ctx.font = (mode === 'giant' ? "150px" : "100px") + " Arial";
  ctx.fillText(pChar, 100, py + (mode === 'giant' ? 100 : 70));
  ctx.globalAlpha = 1.0;
  if (isOver) {
    ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = "#ff0055"; ctx.textAlign = "center";
    ctx.font = "bold 60px sans-serif"; ctx.fillText("K.O. !", w/2, h/2 - 50);
    ctx.fillStyle = "#fff"; ctx.font = "bold 40px sans-serif"; ctx.fillText("REVANCHE", w/2, h/2 + 100);
    ctx.textAlign = "left";
  }
}

function handle(e) {
  if (e && e.target && e.target.id === 'play-gims') return;
  if (isOver) restart(); else if (jumps < 2) { pdy = -24; jumps++; }
}

canvas.addEventListener('touchstart', handle);
canvas.addEventListener('mousedown', handle);
restart(); update();
</script>
</body>
</html>
