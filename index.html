<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZEYNEP GIMS UNSTOPPABLE</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; }
  
  /* Zone Musique qui ne bouge JAMAIS */
  #music-container { 
    position: absolute; top: 10px; right: 10px; 
    z-index: 999; background: #ff0055; 
    padding: 5px; border-radius: 12px; border: 2px solid white;
  }
  
  #score-ui { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 40px; pointer-events: none; text-shadow: 0 0 10px #ff0055; z-index: 10; font-weight: 900; }
</style>
</head>
<body>

<div id="score-ui">💰 <span id="val">0</span></div>

<div id="music-container">
  <iframe width="160" height="90" src="https://www.youtube.com/embed/ERk4Lx-mOqQ?enablejsapi=1" frameborder="0" allow="autoplay; encrypted-media"></iframe>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const valScore = document.getElementById('val');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let g = {
  score: 0, speed: 9, isOver: false, frame: 0,
  p: { x: 80, y: 0, w: 70, h: 70, dy: 0, jumps: 0, mode: 'normal', timer: 0 },
  obs: []
};

// --- FONCTION REVANCHE OPTIMISÉE ---
function revanche() {
  g.score = 0;
  g.speed = 9;
  g.isOver = false;
  g.frame = 0;
  g.p.y = canvas.height - 200;
  g.p.dy = 0;
  g.p.mode = 'normal';
  g.p.timer = 0;
  g.obs = [];
  valScore.innerText = "0";
  console.log("Revanche lancée !");
}

function spawn() {
  let r = Math.random();
  let x = canvas.width + 120;
  // Mix : Cadeaux (40%), Cactus/Monstres (40%), Pièces (20%)
  if (r < 0.4) { 
    g.obs.push({ x, y: canvas.height - 300 - Math.random()*150, w: 60, h: 60, t: 'gift', em: "🎁" });
  } else if (r < 0.8) { 
    g.obs.push({ x, y: canvas.height - 140, w: 60, h: 80, t: 'danger', em: Math.random() > 0.5 ? "🌵" : "👾" });
  } else { 
    g.obs.push({ x, y: 200 + Math.random() * (canvas.height - 400), w: 50, h: 50, t: 'coin', em: "🟡" });
  }
}

function update() {
  if (!g.isOver) {
    g.frame++;
    g.speed += 0.004;
    if (g.p.timer > 0) g.p.timer--; else g.p.mode = 'normal';
    
    g.p.dy += (g.p.mode === 'dragon') ? 0.35 : 1.0;
    g.p.y += g.p.dy;
    
    if (g.p.y > canvas.height - 130) { g.p.y = canvas.height - 130; g.p.dy = 0; g.p.jumps = 0; }
    
    if (g.frame % 40 === 0) spawn();
    
    g.obs.forEach((o, i) => {
      o.x -= g.speed;
      if (g.p.x < o.x + o.w - 10 && g.p.x + g.p.w > o.x + 10 && g.p.y < o.y + o.h - 10 && g.p.y + g.p.h > o.y + 10) {
        if (o.t === 'coin') { g.score += 50; valScore.innerText = g.score; g.obs.splice(i, 1); }
        else if (o.t === 'gift') { 
            const m = ['giant','dragon','ghost'];
            g.p.mode = m[Math.floor(Math.random()*3)];
            g.p.timer = 350; 
            g.obs.splice(i, 1); 
        }
        else if (g.p.mode === 'giant') { g.score += 100; g.obs.splice(i, 1); }
        else if (g.p.mode !== 'ghost') { g.isOver = true; }
      }
      if (o.x < -200) g.obs.splice(i, 1);
    });
  }
  draw();
  requestAnimationFrame(update);
}

function draw() {
  ctx.fillStyle = "#0f172a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Sol Néon
  ctx.fillStyle = `hsl(${g.frame % 360}, 100%, 50%)`;
  ctx.fillRect(0, canvas.height - 65, canvas.width, 10);
  ctx.fillStyle = "#000";
  ctx.fillRect(0, canvas.height - 55, canvas.width, 55);

  g.obs.forEach(o => {
    ctx.font = "60px Arial";
    ctx.fillText(o.em, o.x, o.y + 55);
  });

  let s = g.p.mode === 'giant' ? "👸" : (g.p.mode === 'dragon' ? "🐲" : (g.p.mode === 'ghost' ? "👻" : "👗"));
  if (g.p.mode === 'ghost') ctx.globalAlpha = 0.5;
  ctx.font = (g.p.mode === 'giant' ? "150px" : "80px") + " Arial";
  ctx.fillText(s, g.p.x, g.p.y + (g.p.mode === 'giant' ? 110 : 70));
  ctx.globalAlpha = 1;

  if (g.isOver) {
    ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ff0055";
    ctx.textAlign = "center";
    ctx.font = "bold 70px sans-serif";
    ctx.fillText("FINI !", canvas.width/2, canvas.height/2 - 50);
    
    // BOUTON REVANCHE
    ctx.fillStyle = "#ff0055";
    ctx.fillRect(canvas.width/2 - 200, canvas.height/2 + 60, 400, 100);
    ctx.fillStyle = "white";
    ctx.font = "bold 40px sans-serif";
    ctx.fillText("REVANCHE", canvas.width/2, canvas.height/2 + 125);
    ctx.textAlign = "left";
  }
}

function interact(e) {
  // Si on touche la zone musique, on laisse faire
  if (e.target.closest('#music-container')) return;
  
  if (e) e.preventDefault();
  if (g.isOver) {
    revanche();
  } else {
    if (g.p.mode === 'dragon') g.p.dy = -11;
    else if (g.p.jumps < 2) { g.p.dy = -20; g.p.jumps++; }
  }
}

canvas.addEventListener('touchstart', interact, {passive: false});
canvas.addEventListener('mousedown', interact);

revanche();
update();
</script>
</body>
</html>
