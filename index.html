<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZEYNEP DRESS UP</title>
<style>
  body { font-family: sans-serif; background-color: #ffd6f0; margin: 0; padding: 10px; text-align: center; overflow-x: hidden; }
  #main-container { background: white; border: 4px solid #ff8fd1; border-radius: 20px; max-width: 450px; margin: auto; padding: 10px; }

  /* BARRE INFOS */
  #status-bar { display: flex; justify-content: space-between; align-items: center; background: #fff0f9; padding: 12px; border-radius: 15px; border: 2px solid #ffb6e6; margin-bottom: 10px; }
  #money { color: #d63384; font-weight: bold; font-size: 20px; }
  #theme { color: #ff0080; font-weight: bold; font-size: 15px; }

  /* MANNEQUIN (CORRECT ET NON DÉFORMÉ) */
  #podium {
    position: relative; 
    height: 320px; 
    background: #fff;
    border: 2px solid #ffb6e6; 
    border-radius: 15px; 
    margin-bottom: 15px; 
    overflow: hidden;
  }

  .body-part { position: absolute; background: #ffe0bd; border: 1px solid #f3cbb1; left: 50%; transform: translateX(-50%); }
  #h-head { width: 45px; height: 45px; border-radius: 50%; top: 20px; z-index: 2; }
  #h-torso { width: 40px; height: 75px; top: 62px; border-radius: 8px; z-index: 2; }
  .h-arm { position: absolute; width: 10px; height: 60px; background: #ffe0bd; border: 1px solid #f3cbb1; top: 65px; border-radius: 5px; z-index: 1; }
  #h-arm-l { left: 50%; margin-left: -32px; transform: rotate(5deg); }
  #h-arm-r { left: 50%; margin-left: 22px; transform: rotate(-5deg); }
  #h-leg-l { width: 15px; height: 95px; top: 135px; margin-left: -12px; border-radius: 0 0 5px 5px; z-index: 2; }
  #h-leg-r { width: 15px; height: 95px; top: 135px; margin-left: 12px; border-radius: 0 0 5px 5px; z-index: 2; }

  /* VETEMENTS (BIEN PLACÉS) */
  .cloth { position: absolute; width: 100%; text-align: center; pointer-events: none; left: 0; }
  #v-hair { top: -12px; font-size: 85px; z-index: 10; }
  #v-top  { top: 48px; font-size: 95px; z-index: 8; }
  #v-bot  { top: 110px; font-size: 105px; z-index: 7; }
  #v-shoe { top: 215px; font-size: 60px; z-index: 11; }
  #v-acc  { top: 30px; left: 45px; font-size: 45px; z-index: 12; }

  /* MENUS (LIGNES HORIZONTALES) */
  .title { font-size: 13px; font-weight: bold; color: #ff0080; text-align: left; margin: 12px 0 5px 5px; text-transform: uppercase; }
  .row { 
    display: flex; 
    overflow-x: auto; 
    padding: 10px 5px; 
    background: #fff9fc; 
    border-radius: 15px; 
    border: 1px solid #ffd6f0; 
    margin-bottom: 5px;
    -webkit-overflow-scrolling: touch; 
  }
  
  .item-btn { 
    min-width: 65px; 
    height: 65px; 
    font-size: 38px; 
    margin-right: 12px; 
    background: white; 
    border: 3px solid #ffb6e6; 
    border-radius: 15px; 
    flex-shrink: 0; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    position: relative;
  }
  
  .lock::after { content: "🔒"; position: absolute; font-size: 18px; background: rgba(255,255,255,0.7); width: 100%; height: 100%; display: flex; align-items:center; justify-content:center; border-radius: 12px; }

  /* BOUTON VOTE */
  .vote-btn { 
    width: 100%; 
    padding: 20px; 
    background: #ff0080; 
    color: white; 
    border: none; 
    border-radius: 20px; 
    font-size: 24px; 
    font-weight: bold; 
    margin-top: 15px; 
    box-shadow: 0 6px 0 #b5065e;
  }
  
  #stars { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; font-size: 30px; }
</style>
</head>
<body>

<div id="main-container">
  <div id="status-bar">
    <div id="theme">👗 <span id="t-text">...</span></div>
    <div id="money">💰 <span id="coins">0</span></div>
  </div>

  <div id="podium">
    <div id="stars">✨🌟💖💎🌈</div>
    <div class="body-part" id="h-head"></div>
    <div class="body-part" id="h-torso"></div>
    <div class="h-arm" id="h-arm-l"></div>
    <div class="h-arm" id="h-arm-r"></div>
    <div class="body-part" id="h-leg-l"></div>
    <div class="body-part" id="h-leg-r"></div>

    <div class="cloth" id="v-hair"></div>
    <div class="cloth" id="v-top"></div>
    <div class="cloth" id="v-bot"></div>
    <div class="cloth" id="v-shoe"></div>
    <div class="cloth" id="v-acc"></div>
  </div>

  <div class="title">Coiffures 🎀</div>
  <div class="row">
    <button class="item-btn" onclick="set('hair','')">❌</button>
    <button class="item-btn" onclick="set('hair','💇')">💇</button>
    <button class="item-btn" onclick="set('hair','👱')">👱</button>
    <button class="item-btn" onclick="set('hair','👧')">👧</button>
    <button class="item-btn lock" id="L1" onclick="buy('hair','👸','L1', 50)">👸</button>
  </div>

  <div class="title">Hauts & Robes 👚</div>
  <div class="row">
    <button class="item-btn" onclick="set('top','')">❌</button>
    <button class="item-btn" onclick="set('top','👚')">👚</button>
    <button class="item-btn" onclick="set('top','👕')">👕</button>
    <button class="item-btn" onclick="set('top','🧥')">🧥</button>
    <button class="item-btn" onclick="set('top','👘')">👘</button>
    <button class="item-btn lock" id="L2" onclick="buy('top','👙','L2', 100)">👙</button>
  </div>

  <div class="title">Bas & Chaussures 👠</div>
  <div class="row">
    <button class="item-btn" onclick="set('bot','')">❌</button>
    <button class="item-btn" onclick="set('bot','👖')">👖</button>
    <button class="item-btn" onclick="set('bot','👗')">👗</button>
    <button class="item-btn" onclick="set('shoe','👠')">👠</button>
    <button class="item-btn" onclick="set('shoe','👟')">👟</button>
    <button class="item-btn lock" id="L3" onclick="buy('bot','👰','L3', 200)">👰</button>
  </div>

  <div class="title">Luxe 💍</div>
  <div class="row">
    <button class="item-btn" onclick="set('acc','')">❌</button>
    <button class="item-btn" onclick="set('acc','👜')">👜</button>
    <button class="item-btn" onclick="set('acc','👑')">👑</button>
    <button class="item-btn lock" id="L4" onclick="buy('acc','💎','L4', 80)">💎</button>
    <button class="item-btn lock" id="L5" onclick="buy('acc','💍','L5', 150)">💍</button>
  </div>

  <button class="vote-btn" onclick="voter()">DÉFILER ! ✨</button>
</div>

<script>
  var coins = 0; var itemsOwned = [];
  var themes = ["Bal Royal 👑", "Sport Chic 👟", "Mariage 💍", "Sirène 🌊", "Rock Star 🎸", "Pyjama 🧸", "Hiver ❄️", "Japon 👘", "Princesse 🎀", "Paris 👜", "Manga 🌸", "Fée 🧚", "Disco 💃", "Halloween 🎃", "Noël 🎄", "Espace 🚀", "Licorne 🦄"];

  function set(part, icon) { document.getElementById('v-' + part).innerHTML = icon; }

  function buy(part, icon, id, price) {
    if (itemsOwned.indexOf(id) !== -1) { set(part, icon); } 
    else if (coins >= price) {
      coins -= price; itemsOwned.push(id);
      document.getElementById('coins').innerText = coins;
      document.getElementById(id).classList.remove('lock');
      set(part, icon);
    } else { alert("Pas assez de pièces ! Gagne encore " + (price - coins)); }
  }

  function voter() {
    var score = Math.floor(Math.random() * 21);
    var gain = score * 10;
    coins += gain;
    document.getElementById('coins').innerText = coins;
    document.getElementById('stars').style.display = "block";
    alert("SCORE : " + score + "/10 \n+ " + gain + " pièces ! 💰");
    setTimeout(function() {
      document.getElementById('stars').style.display = "none";
      document.getElementById('t-text').innerText = themes[Math.floor(Math.random() * themes.length)];
      set('hair',''); set('top',''); set('bot',''); set('shoe',''); set('acc','');
    }, 1200);
  }
  document.getElementById('t-text').innerText = themes[0];
</script>

</body>
</html>
