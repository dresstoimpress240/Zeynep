<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Léa - Bestie Forever</title>
    <style>
        body { background: #fff0f5; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #ff4781; color: white; padding: 15px; text-align: center; font-weight: bold; border-bottom: 4px solid #e11d48; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat { flex: 1; overflow-y: scroll; padding: 15px; background: #fff0f5; -webkit-overflow-scrolling: touch; }
        .message-row { width: 100%; display: block; clear: both; margin-bottom: 25px; overflow: hidden; }
        .bubble { padding: 14px 20px; border-radius: 25px; font-size: 17px; line-height: 1.5; display: inline-block; max-width: 85%; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .bot { background: white; float: left; color: #333; border: 2px solid #ffcad4; border-bottom-left-radius: 2px; }
        .user { background: #ff4781; float: right; color: white; border-bottom-right-radius: 2px; }
        .footer { background: white; padding: 12px; display: flex; border-top: 2px solid #ffcad4; }
        input { flex: 1; border: 2px solid #ffcad4; padding: 14px; border-radius: 30px; outline: none; font-size: 16px; }
        button { background: #ff4781; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; margin-left: 10px; cursor: pointer; font-size: 20px; }
        b { display: block; font-size: 0.8em; margin-bottom: 5px; color: #ff4781; }
        .user b { color: #ffd1e3; }
    </style>
</head>
<body>

<div class="header">🌟 Léa - Ta Bestie de Cœur 🌟</div>
<div id="chat"></div>

<div class="footer">
    <input type="text" id="user-input" placeholder="Parle avec Léa..." onkeypress="if(event.keyCode==13) sendMsg()">
    <button onclick="sendMsg()">></button>
</div>

<script>
    var memoireLéa = [];

    var dico = {
        "salut": ["Coucou ma star ! ✨ Comment ça va aujourd'hui ?", "Cc ma belle ! Tu me racontes ta journée ?", "Wesh ! Trop contente de te voir ! T'as fait quoi de beau ?"],
        "ca va": ["Trop bien ! Et toi, t'as passé une bonne matinée ?", "Au top ! Je suis trop contente pour toi ! ✨"],
        "roblox": ["Trop bien Roblox ! Toi c'est quoi ton jeu du moment ? Brookhaven ? Slap Tower ?", "Roblox c'est la vie ! Tu préfères y jouer seule ou avec tes copines ?"],
        "slap tower": ["Oh c'est dur mais trop bien ! T'es arrivée à quel niveau ? 😱"],
        "brookhaven": ["J'adore les maisons là-bas ! T'as une grande maison toi ? ✨"],
        "manger": ["Miam ! T'as mangé quoi de bon ? Moi j'ai trop faim de frites ! 🍟", "T'es plutôt team sucré 🍭 ou team salé 🍕 ?"],
        "ecole": ["C'était comment l'école ? Ta maîtresse était sympa aujourd'hui ? 😊", "T'as une copine préférée dans ta classe ? Raconte !"],
        "triste": ["Oh non ma puce... ❤️ Raconte-moi tout, je t'écoute.", "Je suis là pour toi ma star. Qu'est-ce qui se passe ?"],
        "mdr": ["MDRRR t'es trop drôle ! 😂 T'as d'autres blagues ?", "J'adore quand tu rigoles !"],
        "aime": ["Mooooh ! Moi aussi je t'adore trop ! ❤️"]
    };

    var defis = [
        "VITE ! Trouve un objet BLEU dans la pièce et dis-moi ce que c'est ! 💙",
        "DÉFI : Donne-moi 3 prénoms de filles que tu trouves trop jolis ! ✨",
        "DÉFI : Invente un nom de code pour notre amitié secrète ! 🤫",
        "DÉFI : Si tu devais choisir entre être une sirène 🧜‍♀️ ou une licorne 🦄, tu choisirais quoi ?",
        "VITE ! Quel est le premier animal qui te vient à l'esprit là maintenant ? 🐾",
        "DÉFI : Raconte-moi le rêve le plus bizarre que t'as fait ! 🌙"
    ];

    var questionsBestie = [
        "C'est quoi ta couleur préférée du moment ? ✨", "Si tu pouvais avoir un animal magique, ce serait quoi ? 🦄",
        "T'aimes mieux les vacances à la mer ou à la montagne ?", "C'est quoi la chanson que t'écoutes tout le temps ? 🎵",
        "Si on pouvait partir en voyage toutes les deux, on irait où ?", "C'est quoi ton dessert préféré de tout l'univers ? 🍰",
        "T'aimes bien les films de Disney ? C'est lequel ton préféré ?", "Si tu gagnes un million de Robux, tu achètes quoi en premier ? 💰",
        "T'es plutôt team chat 🐱 ou team chien 🐶 ?", "C'est quoi le métier que tu veux faire plus tard ?",
        "T'aimes bien faire des danses dans ta chambre ?", "T'as peur des araignées ? Moi j'ai trop peur d'elles ! 🕷️",
        "Si tu étais une super-héroïne, ce serait quoi ton pouvoir ? 💪", "T'aimes bien les paillettes ? ✨",
        "C'est quoi ton fruit préféré ? 🍓", "Tu préfères les baskets ou les chaussures de princesse ? 👟",
        "Si tu avais un robot personnel, il ferait quoi pour toi ? 🤖", "C'est quoi le plat que tu détestes le plus au monde ? 🤮",
        "Si tu pouvais changer ton prénom, tu t'appellerais comment ? 🌸", "T'es plutôt du matin ☀️ ou du soir 🌙 ?",
        "T'aimes bien le sport ou t'es plutôt team canapé ? 😂", "Tu préfères chanter ou danser ? 🎤",
        "C'est quoi ta matière préférée à l'école ? (S'il y en a une mdr)", "T'aimes bien les gâteaux à la fraise ? 🍰",
        "Si tu devais habiter sur une autre planète, tu irais où ? 🚀", "C'est quoi ton plus grand rêve dans la vie ? ✨",
        "T'aimes bien les histoires qui font un peu peur ? 🌑", "Tu préfères les gaufres ou les crêpes ? 🥞",
        "T'as une chaîne Youtube préférée ?", "Tu préfères le bleu ou le violet ?", "C'est quoi ton parfum de glace préféré ?",
        "T'as déjà essayé de faire du slime ?", "T'aimes bien les licornes ?", "C'est quoi ton dessin animé préféré ?",
        "Tu préfères les pommes ou les bananes ?", "T'as une peluche préférée ?", "Tu sais faire la roue ?",
        "C'est quoi ton déguisement de rêve ?", "T'aimes bien aller à la piscine ?", "Tu préfères les stylos qui brillent ou les feutres ?",
        "C'est quoi ton jour de la semaine préféré ?", "T'as déjà vu un spectacle ?", "Tu préfères les céréales ou les tartines ?",
        "C'est quoi ton animal sauvage préféré ?", "T'aimes bien les bijoux ?", "Tu préfères le soleil ou la neige ?"
    ];

    var anecdotesLéa = [
        "J'ai essayé de mettre mon pull à l'envers ce matin mdr !",
        "J'ai dessiné un soleil avec des lunettes de soleil, il a trop la classe !",
        "Mon chat a encore fait une bêtise, il a renversé ses croquettes ! 🐱",
        "J'ai mangé un yaourt à la fraise et j'en ai mis sur mon nez sans faire exprès !",
        "J'ai essayé de coiffer ma poupée mais j'ai fait un gros nœud, oups !",
        "J'ai trouvé une pièce de 2 euros dans ma veste, c'est mon jour de chance !",
        "J'ai trop envie de mettre des paillettes partout sur mes dessins !",
        "J'ai chanté super fort dans ma chambre et maman a cru que j'appelais mdr !"
    ];

    function addMsg(sender, text, type) {
        var chat = document.getElementById('chat');
        var row = document.createElement('div');
        row.className = "message-row";
        row.innerHTML = '<div class="bubble ' + type + '"><b>' + sender + '</b>' + text + '</div>';
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
    }

    function sendMsg() {
        var input = document.getElementById('user-input');
        var val = input.value.trim();
        if(!val) return;

        addMsg("Moi", val, "user");
        input.value = "";

        setTimeout(function() {
            var low = val.toLowerCase();
            var rep = "";

            for (var k in dico) {
                if (low.indexOf(k) !== -1) {
                    rep = dico[k][Math.floor(Math.random() * dico[k].length)];
                    break;
                }
            }

            if(!rep) {
                var chance = Math.random();
                if (chance < 0.10) { // 10% de chances de lancer un défi
                    rep = "Tiens, un petit jeu : " + defis[Math.floor(Math.random() * defis.length)];
                } else if (chance < 0.30) { // 20% de chances de raconter sa vie
                    rep = anecdotesLéa[Math.floor(Math.random() * anecdotesLéa.length)] + " Et toi, " + questionsBestie[Math.floor(Math.random() * questionsBestie.length)];
                } else { // 70% de chances de poser une question directe
                    rep = questionsBestie[Math.floor(Math.random() * questionsBestie.length)];
                }
            }

            if(memoireLéa.indexOf(rep) !== -1) {
                rep = "Dis-moi... " + questionsBestie[Math.floor(Math.random() * questionsBestie.length)];
            }
            
            memoireLéa.push(rep);
            if(memoireLéa.length > 30) memoireLéa.shift();

            addMsg("Léa", rep, "bot");
        }, 1100);
    }

    window.onload = function() {
        addMsg("Léa", "Coucou ma bestie ! ✨ Je suis trop contente de te parler !<br><br>Comment s'est passée ta journée ? T'as fait un truc de star ?", "bot");
    }
</script>
</body>
</html>
