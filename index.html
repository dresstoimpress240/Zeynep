<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZEYNEP FASHION EMPIRE</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background-color: #ffd6f0; margin: 0; padding: 10px; text-align: center; overflow-x: hidden; }
  #game-box { background: white; border: 4px solid #ff8fd1; border-radius: 25px; max-width: 450px; margin: auto; padding: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  #top-info { background: #fff0f9; padding: 10px; border-radius: 20px; border: 2px solid #ffb6e6; margin-bottom: 10px; }
  .stats { display: flex; justify-content: space-around; font-weight: bold; color: #d63384; font-size: 18px; }
  #lvl-bar { background: #eee; height: 12px; border-radius: 10px; overflow: hidden; border: 1px solid #ffb6e6; margin-top:5px;}
  #lvl-progress { background: linear-gradient(to right, #ff0080, #ff8fd1); width: 0%; height: 100%; transition: 0.5s; }
  .btn-main { background: linear-gradient(#ff0080, #ff8fd1); color: white; border: 2px solid #fff; border-radius: 15px; padding: 10px; font-weight: bold; cursor: pointer; width: 48%; font-size: 13px; box-shadow: 0 4px 0 #b5065e; }
  #podium { position: relative; height: 320px; background: radial-gradient(circle, #ffffff, #fff0f9); border: 3px solid #ffb6e6; border-radius: 20px; margin: 10px 0; overflow: hidden; display: flex; justify-content: center; }
  .body-part { position: absolute; background: #ffe0bd; border: 1px solid #f3cbb1; left: 50%; transform: translateX(-50%); }
  #h-head { width: 45px; height: 45px; border-radius: 50%; top: 25px; z-index: 2; }
  #h-torso { width: 40px; height: 75px; top: 68px; border-radius: 8px; z-index: 2; }
  .h-arm { position: absolute; width: 10px; height: 60px; background: #ffe0bd; border: 1px solid #f3cbb1; top: 70px; border-radius: 5px; z-index: 1; }
  #h-arm-l { left: 50%; margin-left: -32px; transform: rotate(8deg); }
  #h-arm-r { left: 50%; margin-left: 22px; transform: rotate(-8deg); }
  #h-leg-l { width: 15px; height: 95px; top: 140px; margin-left: -12px; border-radius: 0 0 5px 5px; z-index: 2; }
  #h-leg-r { width: 15px; height: 95px; top: 140px; margin-left: 12px; border-radius: 0 0 5px 5px; z-index: 2; }
  .cloth { position: absolute; width: 100%; text-align: center; pointer-events: none; left: 0; }
  #v-hair { top: -10px; font-size: 85px; z-index: 10; }
  #v-top { top: 52px; font-size: 98px; z-index: 8; }
  #v-bot { top: 115px; font-size: 108px; z-index: 7; }
  #v-shoe { top: 220px; font-size: 60px; z-index: 11; }
  #v-acc { top: 35px; left: 45px; font-size: 45px; z-index: 12; }
  .title { font-size: 13px; font-weight: bold; color: #ff0080; text-align: left; margin: 10px 0 5px 5px; text-transform: uppercase; }
  .row { display: flex; overflow-x: auto; padding: 10px 5px; background: #fff9fc; border-radius: 15px; border: 1px solid #ffd6f0; margin-bottom: 5px; }
  .btn { min-width: 65px; height: 65px; font-size: 38px; margin-right: 12px; background: white; border: 3px solid #ffb6e6; border-radius: 15px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; position: relative; }
  .lock::after { content: "🔒"; position: absolute; font-size: 18px; background: rgba(255,255,255,0.7); width: 100%; height: 100%; display: flex; align-items:center; justify-content:center; border-radius: 12px; }
  #win-screen { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; border:5px solid #ff0080; padding:20px; z-index:100; border-radius:20px; width:80%; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<div id="game-box">
  <div id="top-info"><div class="stats"><span>👑 Niv. <span id="lvl">1</span></span><span>💰 <span id="coins">0</span></span></div>
  <div id="lvl-bar"><div id="lvl-progress"></div></div><div style="color:#ff0080;font-size:14px;font-weight:bold;margin-top:5px;">Thème: <span id="t-text">...</span></div></div>
  <div style="display:flex; justify-content: space-between;"><button class="btn-main" onclick="lancerQuete()">✨ QUÊTE VIP</button>
  <button class="btn-main" style="background:linear-gradient(#ffcc00, #ff9900);" onclick="roue()">🎡 ROUE (1000💰)</button></div>
  <div id="podium"><div class="body-part" id="h-head"></div><div class="body-part" id="h-torso"></div><div class="h-arm" id="h-arm-l"></div><div class="h-arm" id="h-arm-r"></div><div class="body-part" id="h-leg-l"></div><div class="body-part" id="h-leg-r"></div>
  <div class="cloth" id="v-hair"></div><div class="cloth" id="v-top"></div><div class="cloth" id="v-bot"></div><div class="cloth" id="v-shoe"></div><div class="cloth" id="v-acc"></div></div>
  <div class="title">Coiffures 💆‍♀️</div><div class="row"><button class="btn" onclick="set('hair','')">❌</button><button class="btn" onclick="set('hair','💇')">💇</button><button class="btn" onclick="set('hair','👱')">👱</button><button class="btn" onclick="set('hair','👧')">👧</button><button class="btn lock" id="L1" onclick="buy('hair','👸','L1',50)">👸</button><button class="btn lock" id="L5" onclick="buy('hair','👰','L5',150)">👰</button><button class="btn lock" id="L20" onclick="buy('hair','🧚‍♀️','L20',500)">🧚‍♀️</button><button class="btn lock" id="L30" onclick="buy('hair','🧝‍♀️','L30',600)">🧝‍♀️</button><button class="btn lock" id="L40" onclick="buy('hair','🧜‍♀️','L40',700)">🧜‍♀️</button><button class="btn lock" id="L50" onclick="buy('hair','🧙‍♀️','L50',800)">🧙‍♀️</button><button class="btn lock" id="L51" onclick="buy('hair','👩‍🦱','L51',200)">👩‍🦱</button></div>
  <div class="title">Hauts & Robes 👗</div><div class="row"><button class="btn" onclick="set('top','')">❌</button><button class="btn" onclick="set('top','👚')">👚</button><button class="btn" onclick="set('top','👕')">👕</button><button class="btn" onclick="set('top','🎽')">🎽</button><button class="btn lock" id="L2" onclick="buy('top','👗','L2',100)">👗</button><button class="btn lock" id="L7" onclick="buy('top','👙','L7',60)">👙</button><button class="btn lock" id="L21" onclick="buy('top','💃','L21',400)">💃</button><button class="btn lock" id="L25" onclick="buy('top','👘','L25',300)">👘</button><button class="btn lock" id="L41" onclick="buy('top','🧥','L41',450)">🧥</button><button class="btn lock" id="L45" onclick="buy('top','🌟','L45',500)">🌟</button><button class="btn lock" id="L52" onclick="buy('top','🧥','L52',350)">🧥</button><button class="btn lock" id="L53" onclick="buy('top','🥻','L53',250)">🥻</button></div>
  <div class="title">Bas & Chaussures 👠</div><div class="row"><button class="btn" onclick="set('bot','')">❌</button><button class="btn" onclick="set('bot','👖')">👖</button><button class="btn" onclick="set('shoe','👠')">👠</button><button class="btn" onclick="set('shoe','👟')">👟</button><button class="btn lock" id="L3" onclick="buy('bot','👰','L3',200)">👰</button><button class="btn lock" id="L22" onclick="buy('shoe','🛼','L22',300)">🛼</button><button class="btn lock" id="L42" onclick="buy('shoe','🩰','L42',150)">🩰</button><button class="btn lock" id="L46" onclick="buy('shoe','👢','L46',200)">👢</button><button class="btn lock" id="L54" onclick="buy('shoe','⛸️','L54',400)">⛸️</button><button class="btn lock" id="L55" onclick="buy('shoe','👡','L55',180)">👡</button></div>
  <div class="title">Accessoires ✨</div><div class="row"><button class="btn" onclick="set('acc','')">❌</button><button class="btn" onclick="set('acc','💍')">💍</button><button class="btn" onclick="set('acc','👒')">👒</button><button class="btn lock" id="L4" onclick="buy('acc','👑','L4',80)">👑</button><button class="btn lock" id="L10" onclick="buy('acc','💎','L10',300)">💎</button><button class="btn lock" id="L23" onclick="buy('acc','👜','L23',150)">👜</button><button class="btn lock" id="L24" onclick="buy('acc','🕶️','L24',100)">🕶️</button><button class="btn lock" id="L43" onclick="buy('acc','🌂','L43',120)">🌂</button><button class="btn lock" id="L44" onclick="buy('acc','🎈','L44',200)">🎈</button><button class="btn lock" id="L56" onclick="buy('acc','🍭','L56',50)">🍭</button><button class="btn lock" id="L57" onclick="buy('acc','🐱','L57',600)">🐱</button><button class="btn lock" id="L58" onclick="buy('acc','🌈','L58',900)">🌈</button></div>
  <button class="btn-main" style="width:100%;height:60px;margin-top:10px;font-size:20px" onclick="voter()">DÉFILER ! ✨</button>
</div>
<div id="win-screen"><h2>🎡 ROUE DE LA CHANCE !</h2><p id="win-txt"></p><button class="btn-main" style="width:100%; height:50px; font-size:18px;" onclick="document.getElementById('win-screen').style.display='none'">BRAVO ! ✨</button></div>
<script>
  var coins=0, items=[], exp=0, lvl=1, qAct=false;
  var th=["Princesse 🎀","Rock 🎸","Sirène 🌊","Bal 👑","Sport 👟","Fée 🧚","Mariage 💍","Paris 👜","Hiver ❄️","Disco 💃","Safari 🦁","Galaxie 🚀","Licorne 🦄","Chef 🍳","Héroïne ⚡","Ange ☁️","Halloween 🎃","Noël 🎄","Patineuse ⛸️","Tennis 🎾","Plage 🌺","Château 👻","Journaliste 🎤","Manga 🌸","Exploratrice 🌵","Artiste 🎨","Pyjama 🧸","Masqué 🎭","Égypte 🐍","Cow-boy 🤠","Bonbons 🍭","Futur 🤖","Chat 🐱","Jungle 🌿","Danseuse 🩰","Pirate 🏴‍C","Papillon 🦋","Pop 🎙️","Grecque 🏛️","Été ☀️","Glace ❄️","Gothique 🖤","Street 👟","Vampire 🧛‍♀️","Ninja 🥷","Rose 🍭","Perdue 🐚","Poupée 🧸","Nuit 🌙","Promo 💃","Pop Culture 🎙️","Corée 🌸","Vintage 🌈","Punk 🖤","Coeur ❤️","Japon 👘","Pluie ☔","Safari 🦄","Diva 💎","Étoiles 🌌"];
  function set(p,i){document.getElementById('v-'+p).innerHTML=i;}
  function up(){document.getElementById('coins').innerText=coins;document.getElementById('lvl').innerText=lvl;document.getElementById('lvl-progress').style.width=exp+"%";}
  function buy(p,i,id,pr){if(items.includes(id)){set(p,i);}else if(coins>=pr){coins-=pr;unlock(id);set(p,i);}}
  function unlock(id){if(!items.includes(id)){items.push(id);let el=document.getElementById(id);if(el)el.classList.remove('lock');up();}}
  function lancerQuete(){if(qAct)return; qAct=true; var g=(Math.random()<0.1)?1000:200; alert("MISSION: Habille-toi pour le thème ! Gain: "+g+"💰");}
  function roue(){if(coins<1000){alert("Il te faut 1000💰 !");return;} coins-=1000; up();
    if(Math.random() < 0.3) {
      coins += 1000; up(); document.getElementById('win-txt').innerText = "JACKPOT ! Tu récupères tes 1000💰 !";
    } else {
      var lks=Array.from(document.querySelectorAll('.lock'));
      if(lks.length<2){ coins+=1000; up(); alert("Tu as déjà tout !"); return; }
      var r1=lks.splice(Math.floor(Math.random()*lks.length),1)[0], r2=lks[Math.floor(Math.random()*lks.length)];
      unlock(r1.id); unlock(r2.id); document.getElementById('win-txt').innerText="CADEAU ! Tu as gagné : "+r1.innerText+" et "+r2.innerText+" !";
    }
    document.getElementById('win-screen').style.display='block';}
  function voter(){var g=qAct?(Math.random()<0.1?1000:200):30; coins+=g; qAct=false; exp+=25; if(exp>=100){lvl++;exp=0;alert("Niveau "+lvl+" !");} up(); alert("Note: "+(Math.floor(Math.random()*20)+30)+"/50"); 
    setTimeout(()=>{document.getElementById('t-text').innerText=th[Math.floor(Math.random()*th.length)];set('hair','');set('top','');set('bot','');set('shoe','');set('acc','');},1000);}
  document.getElementById('t-text').innerText=th[0]; up();
</script>
</body>
</html>
